services:
  - type: web
    name: synthix
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile --prefer-offline && pnpm run build:render
    startCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm run start:render
    healthCheckPath: /api/healthz
    healthCheckGracePeriod: 30
    healthCheckTimeout: 10
    autoDeploy: true
    numInstances: 1
    scalingPolicy:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
      targetMemoryPercent: 80
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: synthix-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CORS_ORIGINS
        value: ""
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ENABLE_ANALYTICS
        value: "true"
      - key: CACHE_TTL
        value: "3600"
      - key: RATE_LIMIT_WINDOW
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: SESSION_SECRET
        sync: false
      - key: REDIS_URL
        sync: false

  - type: cron
    name: contest-manager
    runtime: node
    rootDir: .
    plan: starter
    schedule: "0 */6 * * *"  # Every 6 hours
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile
    startCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm run contests:manage
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: synthix-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

  - type: cron
    name: contest-winner-processor
    runtime: node
    rootDir: .
    plan: starter
    schedule: "0 0 * * *"  # Daily at midnight
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --no-frozen-lockfile
    startCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm run contests:process-winners
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: synthix-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

databases:
  - name: synthix-db
    plan: starter
