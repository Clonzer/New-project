kind = "web"
previewPath = "/"
title = "3D Print Marketplace"
version = "1.0.0"
id = "artifacts/print3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24856
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/print3d run dev"

[services.env]
PORT = "24856"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/print3d", "run", "build"]
publicDir = "artifacts/print3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
